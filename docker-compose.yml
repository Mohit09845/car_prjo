# ─────────────────────────────────────────────────────────────────────────────
# Car-Project — Docker Compose
#
# Usage:
#   Start:   docker compose up -d
#   Logs:    docker compose logs -f api
#   Stop:    docker compose down
#   Rebuild: docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: car-api:latest
    container_name: car_api
    restart: unless-stopped

    # ── Port binding ─────────────────────────────────────────────────────────
    ports:
      - "8000:8000"

    # ── Environment variables ─────────────────────────────────────────────────
    # The .env file is read at runtime inside the container — never baked
    # into the image layer.  All secrets stay on the host machine.
    env_file:
      - .env

    # ── Health-check (mirrors the Dockerfile HEALTHCHECK) ────────────────────
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Logging ──────────────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
